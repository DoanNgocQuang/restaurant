<div id="view-orders" class="flex-1 overflow-y-auto p-8 space-y-8">
  <div class="flex flex-wrap items-start justify-between gap-4">
    <div>
      <h2 class="text-3xl font-black text-slate-900 dark:text-slate-100 tracking-tight">Quản lý Đơn hàng</h2>
      <p class="text-slate-500 mt-1">Theo dõi, tạo nhanh và chỉnh sửa đơn hàng gắn với booking đang hoạt động.</p>
    </div>
    <button id="add-order-btn" class="flex items-center gap-2 bg-gradient-to-r from-rose-600 to-primary hover:from-rose-500 hover:to-rose-700 text-white px-5 py-2.5 rounded-xl font-bold transition-all shadow-lg shadow-rose-900/20 hover:shadow-rose-900/40 hover:-translate-y-0.5">
      <span class="material-symbols-outlined">receipt_long</span>
      Thêm đơn hàng
    </button>
  </div>

  <div class="grid gap-6 md:grid-cols-3">
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm text-slate-500">Tổng số đơn hàng</p>
      <p id="orders-total-count" class="mt-2 text-3xl font-black text-slate-900 dark:text-white">0</p>
    </div>
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm text-slate-500">Chờ xác nhận (PENDING)</p>
      <p id="orders-pending-count" class="mt-2 text-3xl font-black text-amber-500">0</p>
    </div>
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm text-slate-500">Đã xác nhận (CONFIRMED)</p>
      <p id="orders-confirmed-count" class="mt-2 text-3xl font-black text-emerald-600">0</p>
    </div>
  </div>

  <div class="grid gap-4 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-slate-800 md:grid-cols-3">
    <div>
      <label class="mb-1 block text-xs font-bold uppercase tracking-wider text-slate-500">Trạng thái</label>
      <select id="orders-status-filter" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2 text-sm dark:border-slate-700 dark:bg-slate-900">
        <option value="">Tất cả trạng thái</option>
        <option value="PENDING">PENDING</option>
        <option value="CONFIRMED">CONFIRMED</option>
        <option value="CANCELLED">CANCELLED</option>
      </select>
    </div>
    <div>
      <label class="mb-1 block text-xs font-bold uppercase tracking-wider text-slate-500">Sắp xếp thời gian mua</label>
      <select id="orders-date-sort" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2 text-sm dark:border-slate-700 dark:bg-slate-900">
        <option value="desc">Mới nhất trước</option>
        <option value="asc">Cũ nhất trước</option>
      </select>
    </div>
    <div>
      <label class="mb-1 block text-xs font-bold uppercase tracking-wider text-slate-500">Sắp xếp tổng khoản</label>
      <select id="orders-total-sort" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2 text-sm dark:border-slate-700 dark:bg-slate-900">
        <option value="">Giữ theo thời gian mua</option>
        <option value="desc">Cao đến thấp</option>
        <option value="asc">Thấp đến cao</option>
      </select>
    </div>
  </div>

  <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
          <tr>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Mã đơn</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Khách hàng</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Bàn</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Tổng khoản</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Thời gian mua</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Trạng thái</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Thao tác</th>
          </tr>
        </thead>
        <tbody id="orders-tbody" class="divide-y divide-slate-100 dark:divide-slate-700"></tbody>
      </table>
    </div>
    <div id="orders-pagination"></div>
  </div>
</div>
