<div id="view-tables" class="flex-1 overflow-y-auto p-8 space-y-8">
  <div class="flex flex-wrap items-start justify-between gap-4">
    <div>
      <h2 class="text-3xl font-black text-slate-900 dark:text-slate-100 tracking-tight">Quản lý bàn</h2>
      <p class="text-slate-500 mt-1">Tạo mới, cập nhật và theo dõi trạng thái bàn ăn từ backend.</p>
    </div>
    <button id="add-table-btn" class="flex items-center gap-2 bg-gradient-to-r from-rose-600 to-primary hover:from-rose-500 hover:to-rose-700 text-white px-5 py-2.5 rounded-xl font-bold transition-all shadow-lg shadow-rose-900/20 hover:shadow-rose-900/40 hover:-translate-y-0.5">
      <span class="material-symbols-outlined">add</span>
      Thêm bàn
    </button>
  </div>

  <div class="grid gap-6 md:grid-cols-3">
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm text-slate-500">Tổng số bàn</p>
      <p id="tables-total-count" class="mt-2 text-3xl font-black text-slate-900 dark:text-white">0</p>
    </div>
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm text-slate-500">Bàn khả dụng</p>
      <p id="tables-available-count" class="mt-2 text-3xl font-black text-emerald-600">0</p>
    </div>
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm text-slate-500">Bàn đã giữ / đang dùng</p>
      <p id="tables-busy-count" class="mt-2 text-3xl font-black text-amber-600">0</p>
    </div>
  </div>

  <div id="tables-status-filter" class="flex flex-wrap items-center gap-3">
    <span class="text-sm font-semibold text-slate-500 dark:text-slate-400">Lọc trạng thái:</span>
    <button data-status="" class="table-filter-btn active rounded-full border border-slate-200 bg-white px-4 py-1.5 text-sm font-bold text-slate-700 shadow-sm transition-all hover:shadow-md dark:border-slate-600 dark:bg-slate-700 dark:text-slate-200">Tất cả</button>
    <button data-status="AVAILABLE" class="table-filter-btn rounded-full border border-emerald-200 bg-emerald-50 px-4 py-1.5 text-sm font-bold text-emerald-700 shadow-sm transition-all hover:shadow-md dark:border-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-400">Khả dụng</button>
    <button data-status="RESERVED" class="table-filter-btn rounded-full border border-amber-200 bg-amber-50 px-4 py-1.5 text-sm font-bold text-amber-700 shadow-sm transition-all hover:shadow-md dark:border-amber-800 dark:bg-amber-900/30 dark:text-amber-400">Đã đặt</button>
    <button data-status="OCCUPIED" class="table-filter-btn rounded-full border border-blue-200 bg-blue-50 px-4 py-1.5 text-sm font-bold text-blue-700 shadow-sm transition-all hover:shadow-md dark:border-blue-800 dark:bg-blue-900/30 dark:text-blue-400">Đang dùng</button>
  </div>

  <div id="tables-grid" class="grid grid-cols-1 gap-6 sm:grid-cols-2 xl:grid-cols-3"></div>
  <div id="tables-pagination" class="rounded-2xl border border-slate-200 bg-white shadow-sm dark:border-slate-700 dark:bg-slate-800"></div>
</div>
