<div id="view-vouchers" class="flex-1 overflow-y-auto p-8 space-y-8">

    </div>
    <button id="add-voucher-btn" class="flex items-center gap-2 bg-gradient-to-r from-rose-600 to-primary hover:from-rose-500 hover:to-rose-700 text-white px-5 py-2.5 rounded-xl font-bold transition-all shadow-lg shadow-rose-900/20 hover:shadow-rose-900/40 hover:-translate-y-0.5">

    <div class="overflow-x-auto">
      <table class="w-full text-left">

            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Đã dùng</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Trạng thái</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Thao tác</th>
          </tr>
        </thead>
        <tbody id="vouchers-tbody" class="divide-y divide-slate-100 dark:divide-slate-700"></tbody>
      </table>
    </div>
