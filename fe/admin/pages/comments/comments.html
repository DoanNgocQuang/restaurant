<div id="view-comments" class="flex-1 overflow-y-auto p-8 space-y-8">

    <!-- Header -->
    <div class="flex flex-wrap items-start justify-between gap-4">
        <div>
            <h2 class="text-3xl font-black text-slate-900 dark:text-slate-100 tracking-tight">
                Quản lý bình luận
            </h2>
            <p class="text-slate-500 mt-1">
                Kiểm duyệt đánh giá từ khách hàng, đồng bộ trực tiếp từ backend.
            </p>
        </div>

        <div class="flex flex-wrap gap-3">
            <select id="comment-status-filter"
                class="rounded-xl border border-slate-200 bg-white px-5 py-2.5 font-bold text-slate-700 transition-all hover:border-primary hover:text-primary dark:border-slate-700 dark:bg-slate-800 dark:text-white">
                <option value="">Tất cả trạng thái</option>
                <option value="ACTIVE">Đang hiển thị</option>
                <option value="HIDDEN">Đã ẩn</option>
            </select>

            <select id="comment-sort-filter"
                class="rounded-xl border border-slate-200 bg-white px-5 py-2.5 font-bold text-slate-700 transition-all hover:border-primary hover:text-primary dark:border-slate-700 dark:bg-slate-800 dark:text-white">
                <option value="newest">Mới nhất</option>
                <option value="oldest">Cũ nhất</option>
                <option value="rating_high">Đánh giá cao đến thấp</option>
                <option value="rating_low">Đánh giá thấp đến cao</option>
            </select>
        </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-1 gap-6 lg:grid-cols-3">

        <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
            <p class="text-sm font-semibold text-slate-500">
                Tổng bình luận
            </p>

            <h3 class="mt-2 text-3xl font-black text-slate-900 dark:text-white">
                <span id="comments-total">0</span>
            </h3>
        </div>

        <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
            <p class="text-sm font-semibold text-slate-500">
                Đang hiển thị
            </p>

            <h3 class="mt-2 text-3xl font-black text-emerald-500">
                <span id="comments-active">0</span>
            </h3>
        </div>

        <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
            <p class="text-sm font-semibold text-slate-500">
                Đã ẩn
            </p>

            <h3 class="mt-2 text-3xl font-black text-rose-500">
                <span id="comments-hidden">0</span>
            </h3>
        </div>

    </div>

    <!-- Table -->
    <div
        class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">

        <div class="overflow-x-auto">
            <table class="w-full text-left">

                <thead class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
                    <tr>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">
                            Người dùng
                        </th>

                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">
                            Sản phẩm
                        </th>

                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">
                            Đánh giá
                        </th>

                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">
                            Nội dung
                        </th>

                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">
                            Ngày tạo
                        </th>

                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">
                            Trạng thái
                        </th>

                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">
                            Thao tác
                        </th>
                    </tr>
                </thead>

                <tbody id="comments-tbody" class="divide-y divide-slate-100 dark:divide-slate-700"></tbody>

            </table>
        </div>

        <div id="comments-pagination"></div>

    </div>

</div>
