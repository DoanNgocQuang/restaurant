<div id="view-customers" class="flex-1 overflow-y-auto p-8 space-y-8">
  <div>
    <h2 class="text-3xl font-black text-slate-900 dark:text-slate-100 tracking-tight">Quản lý khách hàng</h2>
    <p class="text-slate-500 mt-1">Backend hiện hỗ trợ xem danh sách người dùng và bật/tắt trạng thái tài khoản.</p>
  </div>

  <div class="grid gap-6 md:grid-cols-3">
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm text-slate-500">Tổng số tài khoản</p>
      <p id="customers-total-count" class="mt-2 text-3xl font-black text-slate-900 dark:text-white">0</p>
    </div>
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm text-slate-500">Đang hoạt động</p>
      <p id="customers-active-count" class="mt-2 text-3xl font-black text-emerald-600">0</p>
    </div>
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm text-slate-500">Vai trò ADMIN</p>
      <p id="customers-admin-count" class="mt-2 text-3xl font-black text-primary">0</p>
    </div>
  </div>

  <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
          <tr>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Khách hàng</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Email</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Số điện thoại</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Vai trò</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Trạng thái</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Ngày tạo</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Thao tác</th>
          </tr>
        </thead>
        <tbody id="customers-tbody" class="divide-y divide-slate-100 dark:divide-slate-700"></tbody>
      </table>
    </div>
    <div id="customers-pagination"></div>
  </div>
</div>
