<div id="view-stats-dishes" class="flex-1 overflow-y-auto p-8 space-y-8">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h2 class="text-3xl font-black text-slate-900 dark:text-slate-100 tracking-tight">Top Món Ăn Bán Chạy</h2>
      <p class="text-slate-500 mt-1">Thống kê khối lượng bán dựa trên đơn hàng đã thanh toán thành công theo tháng.</p>
    </div>
    
    <div class="flex items-center gap-3 bg-white dark:bg-slate-800 p-2 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
      <input type="month" id="stats-dishes-month" class="bg-transparent border-none focus:ring-0 text-sm font-bold text-slate-800 dark:text-white cursor-pointer px-3" />
      <button onclick="renderStatsDishes()" class="bg-primary hover:bg-rose-700 text-white p-2 rounded-lg transition-colors">
        <span class="material-symbols-outlined text-sm">search</span>
      </button>
    </div>
  </div>

  <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden flex flex-col md:flex-row">
    
    <!-- Chart Container -->
    <div class="p-6 border-b md:border-b-0 md:border-r border-slate-200 dark:border-slate-700 w-full md:w-2/3 h-96 relative">
      <h4 class="text-lg font-bold mb-4 text-slate-900 dark:text-white">Biểu đồ Lượt bán (Top 10)</h4>
      <div class="h-80">
        <canvas id="dishesChart"></canvas>
      </div>
    </div>

    <!-- Table Container -->
    <div class="w-full md:w-1/3 p-0 max-h-96 overflow-y-auto custom-scrollbar">
      <table class="w-full text-left relative">
        <thead class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-10">
          <tr>
            <th class="px-5 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Hạng</th>
            <th class="px-5 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Món ăn</th>
            <th class="px-5 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Đã bán</th>
          </tr>
        </thead>
        <tbody id="stats-dishes-tbody" class="divide-y divide-slate-100 dark:divide-slate-700"></tbody>
      </table>
    </div>

  </div>
</div>
