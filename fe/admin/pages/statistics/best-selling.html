<div id="view-stats-dishes" class="flex-1 overflow-y-auto p-8 space-y-8">
  <div>
    <h2 class="text-3xl font-black text-slate-900 dark:text-slate-100 tracking-tight">Tổng quan thực đơn</h2>
    <p class="text-slate-500 mt-1">Backend hiện chưa có endpoint món bán chạy, nên trang này hiển thị thống kê menu theo danh mục và trạng thái.</p>
  </div>

  <div class="grid gap-6 md:grid-cols-3">
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm text-slate-500">Tổng món ăn</p>
      <p id="stats-dishes-total" class="mt-2 text-3xl font-black text-slate-900 dark:text-white">0</p>
    </div>
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm text-slate-500">Đang phục vụ</p>
      <p id="stats-dishes-available" class="mt-2 text-3xl font-black text-emerald-600">0</p>
    </div>
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm text-slate-500">Ngừng / hết hàng</p>
      <p id="stats-dishes-unavailable" class="mt-2 text-3xl font-black text-rose-600">0</p>
    </div>
  </div>

  <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
          <tr>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Danh mục</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Số món</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Đang phục vụ</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Hết hàng</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Giá trung bình</th>
          </tr>
        </thead>
        <tbody id="stats-dishes-tbody" class="divide-y divide-slate-100 dark:divide-slate-700"></tbody>
      </table>
    </div>
  </div>
</div>
