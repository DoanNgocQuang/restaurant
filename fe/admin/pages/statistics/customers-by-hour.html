<div id="view-stats-hours" class="flex-1 overflow-y-auto p-8 space-y-8">
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-3xl font-black text-slate-900 dark:text-slate-100 tracking-tight">Khách hàng theo khung giờ</h2>
      <p class="text-slate-500 mt-1">Phân tích lượng khách đặt bàn theo từng khung giờ trong ngày.</p>
    </div>
  </div>

  <!-- Filter -->
  <div class="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm flex flex-wrap items-end gap-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Tháng</label>
      <input type="month" id="stats-hours-month" class="px-4 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm">
    </div>
    <button onclick="renderStatsHours()" class="flex items-center gap-2 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-700 text-white px-5 py-2 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/20 hover:shadow-blue-900/40 hover:-translate-y-0.5">
      <span class="material-symbols-outlined text-sm">analytics</span>
      Thống kê
    </button>
  </div>

  <!-- Chart -->
  <div class="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
    <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4">Biểu đồ lượng khách theo khung giờ</h3>
    <div style="height: 350px;">
      <canvas id="hoursChart"></canvas>
    </div>
  </div>

  <!-- Table -->
  <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
          <tr>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Khung giờ</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Số booking</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Tổng khách</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Trung bình khách / booking</th>
          </tr>
        </thead>
        <tbody id="stats-hours-tbody" class="divide-y divide-slate-100 dark:divide-slate-700"></tbody>
      </table>
    </div>
  </div>
</div>
