<div id="view-reservations" class="flex-1 overflow-y-auto p-8 space-y-8">
  <div class="flex flex-wrap items-start justify-between gap-4">
    <div>
      <h2 class="text-3xl font-black text-slate-900 dark:text-slate-100 tracking-tight">Quản lý đặt bàn</h2>
      <p class="text-slate-500 mt-1">Admin chỉ quản lý booking được tạo từ phía khách hàng trên trang client.</p>
    </div>
  </div>

  <div class="grid gap-6 md:grid-cols-3">
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm text-slate-500">Chờ xác nhận</p>
      <p id="reservations-pending-count" class="mt-2 text-3xl font-black text-amber-600">0</p>
    </div>
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm text-slate-500">Đã xác nhận</p>
      <p id="reservations-confirmed-count" class="mt-2 text-3xl font-black text-emerald-600">0</p>
    </div>
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm text-slate-500">Đã hủy</p>
      <p id="reservations-cancelled-count" class="mt-2 text-3xl font-black text-rose-600">0</p>
    </div>
  </div>

  <div class="grid gap-4 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-slate-800 md:grid-cols-3">
    <div>
      <label class="mb-1 block text-xs font-bold uppercase tracking-wider text-slate-500">Trạng thái</label>
      <select id="reservations-status-filter" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2 text-sm dark:border-slate-700 dark:bg-slate-900">
        <option value="">Tất cả trạng thái</option>
        <option value="PENDING">PENDING</option>
        <option value="CONFIRMED">CONFIRMED</option>
        <option value="CANCELLED">CANCELLED</option>
      </select>
    </div>
    <div>
      <label class="mb-1 block text-xs font-bold uppercase tracking-wider text-slate-500">Bàn</label>
      <select id="reservations-table-filter" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2 text-sm dark:border-slate-700 dark:bg-slate-900">
        <option value="">Tất cả bàn</option>
      </select>
    </div>
    <div>
      <label class="mb-1 block text-xs font-bold uppercase tracking-wider text-slate-500">Sắp xếp thời gian</label>
      <select id="reservations-date-sort" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2 text-sm dark:border-slate-700 dark:bg-slate-900">
        <option value="desc">Mới nhất trước</option>
        <option value="asc">Cũ nhất trước</option>
      </select>
    </div>
  </div>

  <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
          <tr>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Khách hàng</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Bàn</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Thời gian</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Số khách</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Trạng thái</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Ghi chú</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Thao tác</th>
          </tr>
        </thead>
        <tbody id="reservations-tbody" class="divide-y divide-slate-100 dark:divide-slate-700"></tbody>
      </table>
    </div>
    <div id="reservations-pagination"></div>
  </div>
</div>
