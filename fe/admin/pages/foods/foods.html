<div id="view-dishes" class="flex-1 overflow-y-auto p-8 space-y-8">
  <div class="flex flex-wrap items-start justify-between gap-4">
    <div>
      <h2 class="text-3xl font-black text-slate-900 dark:text-slate-100 tracking-tight">Quản lý món ăn</h2>
      <p class="text-slate-500 mt-1">Đồng bộ trực tiếp với API món ăn và danh mục từ backend.</p>
    </div>
    <div class="flex flex-wrap gap-3">
      <button id="add-category-btn" class="flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-5 py-2.5 font-bold text-slate-700 transition-all hover:border-primary hover:text-primary">
        <span class="material-symbols-outlined">category</span>
        Thêm danh mục
      </button>
      <button id="add-dish-btn" class="flex items-center gap-2 bg-gradient-to-r from-rose-600 to-primary hover:from-rose-500 hover:to-rose-700 text-white px-5 py-2.5 rounded-xl font-bold transition-all shadow-lg shadow-rose-900/20 hover:shadow-rose-900/40 hover:-translate-y-0.5">
        <span class="material-symbols-outlined">add</span>
        Thêm món ăn
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 gap-6 lg:grid-cols-[1.5fr,1fr]">
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm font-semibold text-slate-500">Bộ lọc danh mục</p>
          <h3 class="mt-1 text-xl font-bold text-slate-900 dark:text-white">Thực đơn hiện có</h3>
        </div>
        <select id="food-category-filter" class="rounded-xl border border-slate-200 bg-slate-50 px-4 py-2 text-sm dark:border-slate-700 dark:bg-slate-900">
          <option value="">Tất cả danh mục</option>
        </select>
      </div>
    </div>
    <div id="food-categories-panel" class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
      <p class="text-sm font-semibold text-slate-500">Danh mục</p>
      <div id="food-categories-list" class="mt-4 flex flex-wrap gap-2"></div>
    </div>
  </div>

  <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
          <tr>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Ảnh</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Món ăn</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Danh mục</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Giá</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Mô tả</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Trạng thái</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Thao tác</th>
          </tr>
        </thead>
        <tbody id="dishes-tbody" class="divide-y divide-slate-100 dark:divide-slate-700"></tbody>
      </table>
    </div>
    <div id="dishes-pagination"></div>
  </div>
</div>
