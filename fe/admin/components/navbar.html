<header class="h-16 bg-white dark:bg-background-dark border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 shrink-0">
  <div id="global-search-container" class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-lg px-3 py-1.5 w-96 border border-slate-200 dark:border-slate-700 transition-opacity duration-300">
    <span class="material-symbols-outlined text-slate-400 text-xl">search</span>
    <input class="bg-transparent border-none focus:outline-none focus:ring-0 text-sm w-full placeholder:text-slate-500 ml-2" placeholder="Tìm kiếm..." type="text" />
  </div>
  <div class="flex items-center gap-6">
    <div class="relative">
      <button id="profile-btn" class="flex items-center gap-3 pl-6 border-l border-slate-200 dark:border-slate-800 text-left hover:opacity-80 transition-opacity">
        <div class="text-right hidden sm:block">
          <p data-admin-fullname class="text-sm font-bold leading-none">Quản trị viên</p>
          <p data-admin-role class="text-[10px] text-slate-500 font-semibold uppercase tracking-tight mt-1">Administrator</p>
        </div>
        <div class="h-10 w-10 rounded-full bg-primary/20 flex items-center justify-center overflow-hidden border-2 border-primary/10">
          <img data-admin-avatar alt="User Profile" class="h-full w-full object-cover" src="https://ui-avatars.com/api/?name=Admin&background=800020&color=fff" />
        </div>
      </button>

      <div id="profile-dropdown" class="absolute right-0 mt-2 w-64 bg-white dark:bg-slate-800 rounded-xl shadow-lg border border-slate-200 dark:border-slate-700 hidden z-50">
        <div class="p-4 border-b border-slate-100 dark:border-slate-700">
          <p data-admin-fullname class="text-sm font-bold text-slate-900 dark:text-white">Quản trị viên</p>
          <p data-admin-role class="text-xs text-slate-500">Administrator</p>
        </div>
        <div class="p-4 space-y-3 text-sm">
          <div class="flex items-center gap-3 text-slate-600 dark:text-slate-300">
            <span class="material-symbols-outlined text-[18px]">mail</span>
            <span data-admin-email>--</span>
          </div>
          <div class="flex items-center gap-3 text-slate-600 dark:text-slate-300">
            <span class="material-symbols-outlined text-[18px]">phone</span>
            <span data-admin-phone>--</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
